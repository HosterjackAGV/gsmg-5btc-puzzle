name: Protect maintainer-owned paths

# Hard guard: fail any pull request that touches the community/leaderboard data,
# the CI/verifier scripts, or identity config unless it is authored by the
# maintainer. This enforces "only the maintainer edits these files" even if
# branch protection has not been configured yet. It reads only PR metadata and
# never executes PR code, so it is safe to run on untrusted contributions.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const OWNER_LOGINS = new Set(['hosterjackagv']);          // the maintainer
            const BOT_LOGINS   = new Set(['github-actions[bot]', 'gsmg-bot']);
            const PROTECTED = [
              /^data\//,                 // leaderboards, scores, attempts, user/community data
              /^\.github\//,             // workflows, verifiers, CODEOWNERS, this guard
              /^content\/config\.js$/,   // repo identity + community (giscus) config
            ];

            const pr = context.payload.pull_request;
            const author = (pr.user.login || '').toLowerCase();

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, per_page: 100,
            });
            const touched = files.map(f => f.filename);
            const hits = touched.filter(f => PROTECTED.some(re => re.test(f)));

            if (hits.length === 0) {
              core.info('No maintainer-owned paths touched. OK.');
              return;
            }
            if (OWNER_LOGINS.has(author) || BOT_LOGINS.has(pr.user.login)) {
              core.info(`Maintainer-owned paths touched by ${author}, who is allowed. OK.`);
              return;
            }
            core.setFailed(
              `This PR by @${pr.user.login} modifies maintainer-owned files that only the maintainer may change:\n` +
              hits.map(h => `  - ${h}`).join('\n') +
              `\n\nThese paths (data/, .github/, content/config.js) hold the community leaderboards, the ` +
              `verification pipeline and identity config. Please remove those changes from this PR; the ` +
              `leaderboards update automatically through the verified-submission flow, not by editing files.`
            );
