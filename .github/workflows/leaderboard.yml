name: GSMG leaderboard

# Re-verifies attempt submissions (issues labelled "attempt-batch" or containing a
# gsmg-attempts block) by actually running the decryption, then rebuilds the public
# leaderboard. Also runnable manually to refresh the board.
on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: gsmg-leaderboard
  cancel-in-progress: false

jobs:
  verify:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.body, 'gsmg-attempts') ||
      contains(join(github.event.issue.labels.*.name, ','), 'attempt-batch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify attempts and rebuild leaderboard
        run: node .github/scripts/verify.mjs

      - name: Commit updated data
        run: |
          git config user.name  "gsmg-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "leaderboard: update from issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Comment on the issue and close it
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "Processed — thanks!";
            try { body = fs.readFileSync('verify-summary.txt', 'utf8'); } catch (e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });
