name: Challenge (frontier sweep)
description: Propose a clearly-scoped sweep of the open search space for the community to tackle.
title: "challenge: <short name>"
labels: ["challenge"]
body:
  - type: markdown
    attributes:
      value: |
        Challenges coordinate the collective search so no two people cover the same ground. The in-page
        **Community** view lists open challenges (these issues) alongside the built-in ones. Keep the scope
        crisp and the “done” measurable. Report results as verified attempts via the in-page Hive.
  - type: dropdown
    id: target
    attributes:
      label: Target
      options: [dbbi, faed, cosmic, salphaseion, other]
    validations:
      required: true
  - type: textarea
    id: sweep
    attributes:
      label: The sweep
      description: Exactly what region of the search space you propose to cover.
      placeholder: e.g. "every base-9 reading of dbbi (a=0 and a=1), forwards and reversed, hashed and not."
    validations:
      required: true
  - type: input
    id: done
    attributes:
      label: Done when
      description: The measurable goal that retires this region.
      placeholder: e.g. "all 4 readings × 2 indexings tested against the Cosmic blob, all logged."
    validations:
      required: true
