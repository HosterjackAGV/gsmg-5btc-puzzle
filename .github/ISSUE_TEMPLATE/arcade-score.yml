name: Arcade score (mini-games)
description: Submit a mini-game score. A bot re-simulates your moves and updates the arcade leaderboard.
title: "arcade: <your-handle>"
labels: ["arcade-score"]
body:
  - type: markdown
    attributes:
      value: |
        The **Games board → Submit my best** button fills this in for you automatically. If submitting by
        hand, paste a code block exactly like this (the bot reads the ```` ```json gsmg-arcade ```` block and
        re-runs the deterministic game logic to recompute your score from the moves):

        ````
        ```json gsmg-arcade
        {"handle":"your-handle","scores":[
          {"game":"cryptogram","seed":"daily-20260626","level":3,"moves":[{"c":"Q","g":"T"}]}
        ]}
        ```
        ````
        Only **replay-verifiable** games count (currently `cryptogram`). The score is recomputed from your
        `moves` against `seed`+`level`, so nothing is taken on trust — a fabricated number simply won't reproduce.
  - type: textarea
    id: scores
    attributes:
      label: Scores JSON
      render: json
      placeholder: |
        ```json gsmg-arcade
        {"handle":"your-handle","scores":[ ... ]}
        ```
    validations:
      required: true
