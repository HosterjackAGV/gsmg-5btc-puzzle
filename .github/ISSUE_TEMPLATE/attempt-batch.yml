name: Attempt batch (leaderboard)
description: Submit decrypt attempts for the GSMG endgame. A bot re-verifies each and updates the leaderboard.
title: "attempts: <your-handle>"
labels: ["attempt-batch"]
body:
  - type: markdown
    attributes:
      value: |
        The in-page **Submit** button fills this in for you automatically. If you're submitting by hand,
        paste a code block exactly like this (the bot reads the ```` ```json gsmg-attempts ```` block and
        re-runs the real decryption on each line):

        ````
        ```json gsmg-attempts
        {"handle":"your-handle","attempts":[
          {"blob":"cosmic","recipe":"some candidate recipe","prehash":true,"result":"fail"}
        ]}
        ```
        ````
        `blob` ∈ phase2 · phase3 · phase32 · salphaseion · cosmic. `prehash:true` means the recipe is SHA-256'd
        before AES (the puzzle's normal flow). Results are re-derived from `/ciphertexts`, so nothing is taken on trust.
  - type: textarea
    id: attempts
    attributes:
      label: Attempts JSON
      render: json
      placeholder: |
        ```json gsmg-attempts
        {"handle":"your-handle","attempts":[ ... ]}
        ```
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: What idea does this test? (optional but valued)
      placeholder: e.g. "every base-9 reading of dbbi as yellowblueprimes with faed reversed as yinyang"
